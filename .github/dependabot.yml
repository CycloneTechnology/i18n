
version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - automated
      
    commit-message:
      prefix: "fix(deps)"

    ignore:
      # Do not auto-update Java / Spring baseline aggressively
      - dependency-name: "org.springframework.boot:*"
      - dependency-name: "org.springframework:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

    commit-message:
      prefix: "fix(ci)"
